# ─────────────────────────────────────────────────────────────────────────────
# NextHire AI — Azure DevOps CI/CD Pipeline
# Stages: Install → Build → Test → Deploy (AWS EC2 via SSH)
#
# Required Pipeline Variables (set in Azure DevOps → Pipelines → Variables):
#   EC2_HOST           – Public IP or hostname of the EC2 instance
#   EC2_USER           – SSH username (e.g. ubuntu, ec2-user)
#   SSH_PRIVATE_KEY    – Full PEM private key content (mark as secret)
#   DEPLOY_PATH        – Absolute path on EC2 where code lives (e.g. /home/ubuntu/nexthire)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - production

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'
  SERVER_DIR: 'server'
  CLIENT_DIR: 'client'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Install & Validate
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: Install
    displayName: '📦 Install Dependencies'
    jobs:
      - job: InstallDeps
        displayName: 'Install Server & Client Dependencies'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          # ── Server dependencies ──────────────────────────────────────────
          - script: npm install
            displayName: 'npm install (server)'
            workingDirectory: $(SERVER_DIR)

          # ── Client dependencies ──────────────────────────────────────────
          - script: npm install
            displayName: 'npm install (client)'
            workingDirectory: $(CLIENT_DIR)

          # ── Cache node_modules for downstream stages ─────────────────────
          - task: CacheBeta@1
            displayName: 'Cache server node_modules'
            inputs:
              key: 'npm-server | $(Agent.OS) | $(SERVER_DIR)/package-lock.json'
              path: '$(SERVER_DIR)/node_modules'
              restoreKeys: 'npm-server | $(Agent.OS)'

          - task: CacheBeta@1
            displayName: 'Cache client node_modules'
            inputs:
              key: 'npm-client | $(Agent.OS) | $(CLIENT_DIR)/package-lock.json'
              path: '$(CLIENT_DIR)/node_modules'
              restoreKeys: 'npm-client | $(Agent.OS)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Build
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Build
    displayName: '🔨 Build'
    dependsOn: Install
    condition: succeeded()
    jobs:
      - job: BuildClient
        displayName: 'Build React Client (Vite)'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: CacheBeta@1
            displayName: 'Restore client node_modules'
            inputs:
              key: 'npm-client | $(Agent.OS) | $(CLIENT_DIR)/package-lock.json'
              path: '$(CLIENT_DIR)/node_modules'
              restoreKeys: 'npm-client | $(Agent.OS)'

          - script: npm run build
            displayName: 'Vite production build'
            workingDirectory: $(CLIENT_DIR)

          # Publish build artifacts for potential deployment
          - task: PublishBuildArtifacts@1
            displayName: 'Publish client/dist'
            inputs:
              PathtoPublish: '$(CLIENT_DIR)/dist'
              ArtifactName: 'client-dist'
              publishLocation: Container

      - job: ValidateServer
        displayName: 'Validate Server (syntax check)'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: CacheBeta@1
            displayName: 'Restore server node_modules'
            inputs:
              key: 'npm-server | $(Agent.OS) | $(SERVER_DIR)/package-lock.json'
              path: '$(SERVER_DIR)/node_modules'
              restoreKeys: 'npm-server | $(Agent.OS)'

          # Dry-run: check all entry modules load without runtime errors
          - script: node --check index.js
            displayName: 'Syntax check index.js'
            workingDirectory: $(SERVER_DIR)

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Test
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Test
    displayName: '🧪 Test'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: RunTests
        displayName: 'Run Server Tests'
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: CacheBeta@1
            displayName: 'Restore server node_modules'
            inputs:
              key: 'npm-server | $(Agent.OS) | $(SERVER_DIR)/package-lock.json'
              path: '$(SERVER_DIR)/node_modules'
              restoreKeys: 'npm-server | $(Agent.OS)'

          # Run tests if a test script exists; skip gracefully if not yet configured
          - script: |
              if npm run test --if-present 2>&1 | grep -q "missing script"; then
                echo "##[warning] No test script found — skipping. Add 'test' to package.json to enable."
                exit 0
              fi
              npm test
            displayName: 'npm test (server)'
            workingDirectory: $(SERVER_DIR)
            env:
              NODE_ENV: test
              # Prevent real DB/LLM calls in CI — override in pipeline variables
              MONGODB_URI: $(MONGODB_URI_TEST)
              GROQ_API_KEY: $(GROQ_API_KEY)
              JWT_SECRET: ci-test-secret-not-for-production

          # Publish test results if Jest JUnit reporter is configured
          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '$(SERVER_DIR)/test-results/*.xml'
              failTaskOnFailedTests: true
              mergeTestResults: true

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — Deploy to AWS EC2
# Runs only on pushes to main/production (not on PRs)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: '🚀 Deploy to AWS EC2'
    dependsOn: Test
    condition: |
      and(
        succeeded(),
        in(variables['Build.SourceBranchName'], 'main', 'production'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - deployment: DeployToEC2
        displayName: 'SSH Deploy → EC2'
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NodeTool@0
                  displayName: 'Use Node.js $(NODE_VERSION)'
                  inputs:
                    versionSpec: $(NODE_VERSION)

                # ── Write SSH private key to disk ────────────────────────────
                - script: |
                    mkdir -p ~/.ssh
                    echo "$(SSH_PRIVATE_KEY)" > ~/.ssh/nexthire_deploy.pem
                    chmod 600 ~/.ssh/nexthire_deploy.pem
                    ssh-keyscan -H $(EC2_HOST) >> ~/.ssh/known_hosts
                  displayName: 'Configure SSH key'
                  env:
                    SSH_PRIVATE_KEY: $(SSH_PRIVATE_KEY)

                # ── Deploy script via SSH ────────────────────────────────────
                - script: |
                    ssh -i ~/.ssh/nexthire_deploy.pem \
                        -o StrictHostKeyChecking=no \
                        $(EC2_USER)@$(EC2_HOST) << 'ENDSSH'

                      set -e   # abort on any error

                      echo "==> Navigating to deploy path"
                      cd $(DEPLOY_PATH)

                      echo "==> Pulling latest code from origin"
                      git pull origin main

                      echo "==> Installing server dependencies"
                      cd server && npm install --omit=dev
                      cd ..

                      echo "==> Installing client dependencies & building"
                      cd client && npm install && npm run build
                      cd ..

                      echo "==> Restarting server with PM2"
                      # Start if not running; reload zero-downtime if already running
                      pm2 describe nexthire-api > /dev/null 2>&1 \
                        && pm2 reload nexthire-api --update-env \
                        || pm2 start server/index.js \
                             --name nexthire-api \
                             --node-args="--experimental-vm-modules" \
                             --env production \
                             --max-memory-restart 512M \
                             --log /var/log/nexthire/pm2.log

                      pm2 save   # persist process list across reboots

                      echo "==> Deploy complete ✓"
                    ENDSSH
                  displayName: 'SSH → pull, install, PM2 reload'
                  env:
                    EC2_HOST: $(EC2_HOST)
                    EC2_USER: $(EC2_USER)
                    DEPLOY_PATH: $(DEPLOY_PATH)

                # ── Smoke test: hit health endpoint ─────────────────────────
                - script: |
                    echo "Waiting 10s for server to boot..."
                    sleep 10

                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                      http://$(EC2_HOST):5000/api/health)

                    if [ "$STATUS" = "200" ]; then
                      echo "✅ Health check passed (HTTP $STATUS)"
                    else
                      echo "❌ Health check failed (HTTP $STATUS)"
                      exit 1
                    fi
                  displayName: 'Post-deploy health check'
                  env:
                    EC2_HOST: $(EC2_HOST)

                # ── Cleanup: remove SSH key from agent ───────────────────────
                - script: rm -f ~/.ssh/nexthire_deploy.pem
                  displayName: 'Cleanup SSH key'
                  condition: always()
